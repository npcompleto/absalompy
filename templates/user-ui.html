<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absalom Chat Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --user-bubble: #334155;
            --bot-bubble: linear-gradient(135deg, #3a7bd5, #00d2ff);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 0.6rem 1rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        .refresh-btn svg {
            transition: transform 0.5s ease;
        }

        .refresh-btn:active svg {
            transform: rotate(180deg);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent),
                              radial-gradient(circle at bottom left, rgba(58, 123, 213, 0.1), transparent);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header --- */
        header {
            padding: 1.5rem;
            text-align: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        h1 {
            font-size: 1.5rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        /* --- Main Content Layout --- */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 1.5rem;
            overflow: hidden;
        }

        .chat-box {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-out;
            position: relative;
        }

        .user-msg {
            align-self: flex-end;
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
            color: white;
        }

        .bot-msg {
            align-self: flex-start;
            background: var(--bot-bubble);
            border-bottom-left-radius: 4px;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 210, 255, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Chat Input Area (Inside Box) --- */
        .input-bar {
            padding: 1.5rem 2rem;
            background: rgba(15, 23, 42, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 1rem;
            align-items: center;
            border-bottom-left-radius: 32px;
            border-bottom-right-radius: 32px;
        }

        .input-bar input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            color: white;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-bar input:focus {
            border-color: var(--primary);
        }

        .send-btn {
            background: var(--primary);
            border: none;
            border-radius: 12px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .send-btn:hover { transform: scale(1.05); }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 900px; margin: 0 auto; width: 100%;">
            <div style="text-align: left;">
                <h1>Absalom Chat Hub</h1>
                <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; display: flex; align-items: center;">
                    <span id="status-dot" class="status-dot"></span>
                    <span id="status-text">Absalom è in standby</span>
                </div>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button id="refresh-history" class="refresh-btn" title="Aggiorna cronologia">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1.7 19.3L1 23l3.7-.7M23 10a10 10 0 1 0-3 12.3"/>
                    </svg>
                    <span>Aggiorna</span>
                </button>

                <a href="/uploads" class="refresh-btn" style="text-decoration: none;" title="Carica documenti">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                    </svg>
                    <span>Carica</span>
                </a>
            </div>
        </div>
    </header>

    <main>
        <div class="chat-box">
            <div id="chat-container">
                <div class="message bot-msg">Ciao! Sono Ron, il tuo B-Bot. Come posso aiutarti oggi?</div>
            </div>

            <div class="input-bar">
                <input type="text" id="chat-input" placeholder="Invia un comando o scrivi ad Absalom...">
                <button class="send-btn" id="send-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z" />
                    </svg>
                </button>
            </div>
        </div>
    </main>

    </main>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');

        let isBotTalking = false;

        function addMessage(text, side) {
            if (!text) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${side}-msg`;
            msgDiv.innerText = text.trim();
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function loadHistory() {
            try {
                // Ottiene la data odierna in formato YYYY-MM-DD
                const now = new Date();
                const offset = now.getTimezoneOffset();
                const localDate = new Date(now.getTime() - (offset * 60 * 1000)).toISOString().split('T')[0];
                
                const res = await fetch(`/api/memory/${localDate}`);
                const data = await res.json();
                
                if (data.content) {
                    chatContainer.innerHTML = '';
                    const entries = data.content.split('\n\n');
                    entries.forEach(entry => {
                        if (entry.startsWith('Utente: ')) {
                            addMessage(entry.replace('Utente: ', ''), 'user');
                        } else if (entry.startsWith('Absalom: ')) {
                            addMessage(entry.replace('Absalom: ', ''), 'bot');
                        }
                    });
                }
            } catch (err) {
                console.error("Errore caricamento cronologia:", err);
            }
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text || isBotTalking) return;

            addMessage(text, 'user');
            chatInput.value = '';
            isBotTalking = true;
            statusText.innerText = 'Ron sta pensando...';
            statusDot.classList.add('active');

            try {
                await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: text})
                });
                
                // Polling per la risposta
                pollResponse();
            } catch (err) {
                console.error(err);
                isBotTalking = false;
            }
        }

        async function pollResponse() {
            const interval = setInterval(async () => {
                const res = await fetch('/status');
                const state = await res.json();
                
                if (state.chat_response) {
                    clearInterval(interval);
                    
                    // Ricarica la cronologia completa come richiesto
                    await loadHistory();
                    
                    // Comunica al server che la risposta è stata ricevuta ("consumata")
                    await fetch('/control', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({chat_response: null})
                    });

                    isBotTalking = false;
                    statusText.innerText = 'Ron è attivo';
                    statusDot.classList.remove('active');
                }
            }, 2000);
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
        
        document.getElementById('refresh-history').addEventListener('click', () => {
            loadHistory();
        });

        // Caricamento iniziale
        loadHistory();

        // Aggiornamento stato periodico
        setInterval(async () => {
            if (isBotTalking) return;
            const res = await fetch('/status');
            const state = await res.json();
            statusText.innerText = state.busy ? 'Ron è occupato' : (state.mode === 'awake' ? 'Ron è attivo' : 'Ron sta dormendo');
            if (state.busy) statusDot.classList.add('active');
            else statusDot.classList.remove('active');
        }, 3000);
    </script>
</body>
</html>
