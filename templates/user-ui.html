<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absalom Chat Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --user-bubble: #334155;
            --bot-bubble: linear-gradient(135deg, #3a7bd5, #00d2ff);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent),
                              radial-gradient(circle at bottom left, rgba(58, 123, 213, 0.1), transparent);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header --- */
        header {
            padding: 1.5rem;
            text-align: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        h1 {
            font-size: 1.5rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        /* --- Chat Container --- */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 1rem 100px 1rem; /* Padding per l'input fisso */
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-out;
            position: relative;
        }

        .user-msg {
            align-self: flex-end;
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
            color: white;
        }

        .bot-msg {
            align-self: flex-start;
            background: var(--bot-bubble);
            border-bottom-left-radius: 4px;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 210, 255, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Input Bar --- */
        .input-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            padding: 1.5rem;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 1rem;
            align-items: center;
            max-width: 800px;
            width: 100%;
            z-index: 150;
        }

        .input-bar input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            color: white;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-bar input:focus {
            border-color: var(--primary);
        }

        .send-btn {
            background: var(--primary);
            border: none;
            border-radius: 12px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .send-btn:hover { transform: scale(1.05); }

        /* --- Floating Action Button --- */
        .fab {
            position: fixed;
            bottom: 100px;
            right: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 200;
        }

        .fab:hover { transform: rotate(90deg) scale(1.1); }

        .fab svg { width: 30px; height: 30px; color: white; }

        /* --- Modal / Upload Overlay --- */
        #upload-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .close-btn {
            margin-top: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: underline;
        }

        /* --- Reuse previous upload styles --- */
        .upload-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 2rem;
            margin: 1.5rem 0;
            cursor: pointer;
            position: relative;
        }
        .upload-zone input { position: absolute; width:100%; height:100%; top:0; left:0; opacity:0; }
        
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            display: inline-block; margin-right: 5px;
            background: #94a3b8;
        }
        .status-dot.active { background: #10b981; animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Absalom Chat</h1>
        <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 5px;">
            <span id="status-dot" class="status-dot"></span>
            <span id="status-text">Absalom è in standby</span>
        </div>
    </header>

    <div id="chat-container">
        <div class="message bot-msg">Ciao! Sono Ron, il tuo B-Bot. Come posso aiutarti oggi?</div>
    </div>

    <div class="input-bar">
        <input type="text" id="chat-input" placeholder="Scrivi un messaggio...">
        <button class="send-btn" id="send-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z" />
            </svg>
        </button>
    </div>

    <!-- FAB -->
    <div class="fab" id="open-upload" title="Carica documenti nella Wiki">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14" />
        </svg>
    </div>

    <!-- Upload Overlay -->
    <div id="upload-overlay">
        <div class="modal-content">
            <h2>Archivio Wiki</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Aggiungi documenti alla conoscenza di Absalom</p>
            
            <div class="upload-zone" id="drop-zone">
                <p>Trascina i file qui o clicca per selezionare</p>
                <input type="file" id="file-input" multiple>
            </div>
            
            <div id="file-list" style="max-height: 100px; overflow-y: auto; margin-bottom: 1rem;"></div>
            
            <button id="upload-btn" style="width:100%; padding: 0.8rem; border-radius: 12px; background: var(--primary); border:none; color:white; font-weight:600; cursor:pointer;">Avvia Ingestione</button>
            <div id="upload-status" style="margin-top: 1rem; font-size: 0.9rem;"></div>
            
            <div class="close-btn" id="close-upload">Chiudi</div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');

        let isBotTalking = false;

        function addMessage(text, side) {
            if (!text) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${side}-msg`;
            msgDiv.innerText = text.trim();
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function loadHistory() {
            try {
                // Ottiene la data odierna in formato YYYY-MM-DD
                const now = new Date();
                const offset = now.getTimezoneOffset();
                const localDate = new Date(now.getTime() - (offset * 60 * 1000)).toISOString().split('T')[0];
                
                const res = await fetch(`/api/memory/${localDate}`);
                const data = await res.json();
                
                if (data.content) {
                    chatContainer.innerHTML = '';
                    const entries = data.content.split('\n\n');
                    entries.forEach(entry => {
                        if (entry.startsWith('Utente: ')) {
                            addMessage(entry.replace('Utente: ', ''), 'user');
                        } else if (entry.startsWith('Absalom: ')) {
                            addMessage(entry.replace('Absalom: ', ''), 'bot');
                        }
                    });
                }
            } catch (err) {
                console.error("Errore caricamento cronologia:", err);
            }
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text || isBotTalking) return;

            addMessage(text, 'user');
            chatInput.value = '';
            isBotTalking = true;
            statusText.innerText = 'Ron sta pensando...';
            statusDot.classList.add('active');

            try {
                await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: text})
                });
                
                // Polling per la risposta
                pollResponse();
            } catch (err) {
                console.error(err);
                isBotTalking = false;
            }
        }

        async function pollResponse() {
            const interval = setInterval(async () => {
                const res = await fetch('/status');
                const state = await res.json();
                
                if (state.chat_response) {
                    clearInterval(interval);
                    
                    // Ricarica la cronologia completa come richiesto
                    await loadHistory();
                    
                    // Comunica al server che la risposta è stata ricevuta ("consumata")
                    await fetch('/control', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({chat_response: null})
                    });

                    isBotTalking = false;
                    statusText.innerText = 'Ron è attivo';
                    statusDot.classList.remove('active');
                }
            }, 2000);
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

        // Caricamento iniziale
        loadHistory();

        /* --- Upload Logic --- */
        const overlay = document.getElementById('upload-overlay');
        const openUpload = document.getElementById('open-upload');
        const closeUpload = document.getElementById('close-upload');
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const uploadStatus = document.getElementById('upload-status');

        openUpload.onclick = () => overlay.style.display = 'flex';
        closeUpload.onclick = () => overlay.style.display = 'none';

        uploadBtn.onclick = async () => {
            const files = fileInput.files;
            if (files.length === 0) return;

            const formData = new FormData();
            for(let f of files) formData.append('files', f);

            uploadStatus.innerText = 'Caricamento...';
            try {
                const res = await fetch('/api/wiki/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await res.json();
                uploadStatus.innerText = '✅ ' + result.message;
                setTimeout(() => { overlay.style.display = 'none'; uploadStatus.innerText = ''; }, 2000);
            } catch (err) {
                uploadStatus.innerText = '❌ Errore caricamento';
            }
        };

        // Aggiornamento stato periodico
        setInterval(async () => {
            if (isBotTalking) return;
            const res = await fetch('/status');
            const state = await res.json();
            statusText.innerText = state.busy ? 'Ron è occupato' : (state.mode === 'awake' ? 'Ron è attivo' : 'Ron sta dormendo');
            if (state.busy) statusDot.classList.add('active');
            else statusDot.classList.remove('active');
        }, 3000);
    </script>
</body>
</html>
