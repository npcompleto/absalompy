<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absalom Face Control</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --eye-color: #00f2ff;
            --eye-shadow: rgba(0, 242, 255, 0.5);
            --eye-width: 120px;
            --eye-height: 200px;
            --eye-radius: 20px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .face-container {
            position: relative;
            display: flex;
            gap: 100px;
            perspective: 1000px;
        }

        .eye {
            width: var(--eye-width);
            height: var(--eye-height);
            background-color: var(--eye-color);
            border-radius: var(--eye-radius);
            box-shadow: 0 0 30px var(--eye-shadow), inset 0 0 15px rgba(255, 255, 255, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        /* Reflection Effect */
        .eye::after {
            content: '';
            position: absolute;
            top: 10%;
            left: 10%;
            width: 30%;
            height: 20%;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            filter: blur(2px);
        }

        .eye.closed {
            height: 4px;
            margin-top: calc(var(--eye-height) / 2 - 2px);
            margin-bottom: calc(var(--eye-height) / 2 - 2px);
            box-shadow: 0 0 10px var(--eye-shadow);
        }

        /* Glow animation for "alive" feel */
        @keyframes pulse {
            0% {
                opacity: 0.8;
                box-shadow: 0 0 20px var(--eye-shadow);
            }

            50% {
                opacity: 1;
                box-shadow: 0 0 40px var(--eye-shadow);
            }

            100% {
                opacity: 0.8;
                box-shadow: 0 0 20px var(--eye-shadow);
            }
        }

        .eye:not(.closed) {
            animation: pulse 4s infinite ease-in-out;
        }

        .status-indicator {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Loader Styles */
        #loader {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: opacity 0.3s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 242, 255, 0.1);
            border-top: 3px solid var(--eye-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            filter: drop-shadow(0 0 10px var(--eye-shadow));
        }

        .loader-text {
            color: var(--eye-color);
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.8;
            animation: pulse-text 1.5s infinite ease-in-out;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .eye.loading {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-top: calc(var(--eye-height) / 2 - 40px);
            margin-bottom: calc(var(--eye-height) / 2 - 40px);
            background: transparent;
            border: 8px solid rgba(0, 242, 255, 0.1) !important;
            border-top: 8px solid var(--eye-color) !important;
            box-shadow: 0 0 30px var(--eye-shadow) !important;
            animation: spin 1s linear infinite !important;
            border: none;
        }

        .eye.angry {
            transform: translateY(20px) rotate(15deg);
        }

        #eye-right.angry {
            transform: translateY(20px) rotate(-15deg);
        }

        .eye.sad {
            transform: translateY(20px) rotate(-15deg);
        }

        #eye-right.sad {
            transform: translateY(20px) rotate(15deg);
        }

        .eye.loading::after {
            display: none;
            /* Hide reflection during loading for a cleaner spinner look */
        }

        @keyframes pulse-text {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }
        }

        /* Mouth Styles */
        .mouth {
            position: absolute;
            bottom: -140px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 100px;
            transition: all 0.3s ease;
            opacity: 0.8;
            cursor: pointer;
        }

        .lip {
            fill: none;
            stroke: var(--eye-color);
            stroke-width: 8;
            stroke-linecap: round;
            filter: drop-shadow(0 0 10px var(--eye-shadow));
            transition: all 0.3s ease;
        }

        /* Closed state (flat lines) */
        #lip-upper {
            d: path("M 30 50 Q 100 50 170 50");
        }

        #lip-lower {
            d: path("M 30 52 Q 100 52 170 52");
        }

        /* Sad state (downward curve) */
        .mouth.sad #lip-upper,
        .mouth.angry #lip-upper {
            d: path("M 30 70 Q 100 40 170 70");
        }

        .mouth.sad #lip-lower,
        .mouth.angry #lip-lower {
            d: path("M 30 75 Q 100 45 170 75");
        }

        /* Speaking animation */
        .speaking #lip-upper {
            animation: talk-upper 0.25s infinite ease-in-out;
        }

        .speaking #lip-lower {
            animation: talk-lower 0.25s infinite ease-in-out;
        }

        @keyframes talk-upper {

            0%,
            100% {
                d: path("M 30 50 Q 100 50 170 50");
                transform: translateY(0);
            }

            50% {
                d: path("M 30 50 Q 100 20 170 50");
                transform: translateY(-10px);
            }
        }

        @keyframes talk-lower {

            0%,
            100% {
                d: path("M 30 52 Q 100 52 170 52");
                transform: translateY(0);
            }

            50% {
                d: path("M 30 52 Q 100 82 170 52");
                transform: translateY(10px);
            }
        }

        .history-trigger {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--eye-color);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .history-trigger:hover {
            background: rgba(0, 242, 255, 0.2);
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--eye-shadow);
        }

        .history-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .history-overlay.active {
            display: flex;
            opacity: 1;
        }

        .history-content {
            background: rgba(15, 15, 20, 0.95);
            border: 1px solid var(--eye-color);
            padding: 40px;
            border-radius: 24px;
            max-width: 600px;
            width: 85%;
            position: relative;
            box-shadow: 0 0 60px rgba(0, 242, 255, 0.15);
            transform: translateY(20px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .history-overlay.active .history-content {
            transform: translateY(0);
        }

        .history-content h3 {
            color: var(--eye-color);
            margin-top: 0;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(0, 242, 255, 0.1);
            padding-bottom: 20px;
            margin-bottom: 30px;
            font-size: 1.2rem;
        }

        .chat-interaction {
            display: flex;
            flex-direction: column;
            gap: 25px;
            overflow: scroll;
            height: 50vh;
        }

        .message {
            line-height: 1.6;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.03);
            padding: 15px 20px;
            border-radius: 12px;
            border-left: 3px solid var(--eye-color);
        }

        .message strong {
            display: block;
            color: var(--eye-color);
            margin-bottom: 8px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            opacity: 0.4;
            transition: opacity 0.2s;
        }

        .close-btn:hover {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="face-container">
        <div id="eye-left" class="eye"></div>
        <div id="eye-right" class="eye"></div>
        <svg id="mouth-svg" class="mouth" viewBox="0 0 200 100">
            <path id="lip-upper" class="lip" />
            <path id="lip-lower" class="lip" />
        </svg>
        <div id="status" class="status-indicator">System Active</div>
    </div>

    <button id="history-btn" class="history-trigger" onclick="toggleHistory()" title="Ultima conversazione">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z" />
        </svg>
    </button>

    <div id="history-overlay" class="history-overlay">
        <div class="history-content">
            <button class="close-btn" onclick="toggleHistory()">×</button>
            <h3>Ultima Conversazione</h3>
            <div class="chat-interaction">
                <div class="message user-msg">
                    <strong>Tu</strong>
                    <span id="last-user-text">Nessun messaggio recente.</span>
                </div>
                <div class="message bot-msg">
                    <strong>Absalom</strong>
                    <span id="last-bot-text">In attesa di istruzioni.</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const eyeLeft = document.getElementById('eye-left');
        const eyeRight = document.getElementById('eye-right');
        const statusText = document.getElementById('status');
        const mouthSvg = document.getElementById('mouth-svg');

        function updateEyes(state) {
            if (state === 'closed') {
                eyeLeft.classList.add('closed');
                eyeRight.classList.add('closed');
            } else {
                eyeLeft.classList.remove('closed');
                eyeRight.classList.remove('closed');
            }
        }

        async function pollStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();

                updateEyes(data.eyes);
                statusText.innerText = `System: ${data.eyes}`;

                // Toggle Loading State on Eyes (independent from busy)
                if (data.loading) {
                    eyeLeft.classList.add('loading');
                    eyeRight.classList.add('loading');
                } else {
                    eyeLeft.classList.remove('loading');
                    eyeRight.classList.remove('loading');
                }

                // Toggle Speaking (Mouth Animation)
                if (data.speaking) {
                    mouthSvg.classList.add('speaking');
                } else {
                    mouthSvg.classList.remove('speaking');
                }

                // Toggle Angry Face
                if (data.angry) {
                    eyeLeft.classList.add('angry');
                    eyeRight.classList.add('angry');
                    mouthSvg.classList.add('angry');
                } else {
                    eyeLeft.classList.remove('angry');
                    eyeRight.classList.remove('angry');
                    mouthSvg.classList.remove('angry');
                }

                // Toggle Sad Face
                if (data.sad) {
                    mouthSvg.classList.add('sad');
                    eyeLeft.classList.add('sad');
                    eyeRight.classList.add('sad');
                } else {
                    mouthSvg.classList.remove('sad');
                    eyeLeft.classList.remove('sad');
                    eyeRight.classList.remove('sad');
                }

                // Update History Data
                if (data.last_interaction) {
                    document.getElementById('last-user-text').innerText = data.last_interaction.user || "Nessun messaggio recente.";
                    document.getElementById('last-bot-text').innerText = data.last_interaction.bot || "In attesa di istruzioni.";
                }

            } catch (err) {
                console.error("Polling error:", err);
            }
        }

        // Poll every 100ms for responsiveness
        setInterval(pollStatus, 100);

        // Click on mouth to stop audio
        mouthSvg.addEventListener('click', async () => {
            console.log("Mouth clicked: stopping audio...");
            try {
                await fetch('/stop_audio', { method: 'POST' });
            } catch (err) {
                console.error("Error stopping audio:", err);
            }
        });

        // Initial blink animation sequence for "boot up"
        setTimeout(() => {
            updateEyes('closed');
            setTimeout(() => updateEyes('open'), 150);
        }, 1000);

        function toggleHistory() {
            const overlay = document.getElementById('history-overlay');
            if (overlay.style.display === 'flex') {
                overlay.classList.remove('active');
                setTimeout(() => { overlay.style.display = 'none'; }, 300);
            } else {
                overlay.style.display = 'flex';
                setTimeout(() => { overlay.classList.add('active'); }, 10);
            }
        }
    </script>
</body>

</html>
