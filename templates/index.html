<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absalom Face Control</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --eye-color: #00f2ff;
            --eye-shadow: rgba(0, 242, 255, 0.5);
            --eye-width: 120px;
            --eye-height: 200px;
            --eye-radius: 20px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .face-container {
            position: relative;
            display: flex;
            gap: 100px;
            perspective: 1000px;
        }

        .eye {
            width: var(--eye-width);
            height: var(--eye-height);
            background-color: var(--eye-color);
            border-radius: var(--eye-radius);
            box-shadow: 0 0 30px var(--eye-shadow), inset 0 0 15px rgba(255, 255, 255, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        /* Reflection Effect */
        .eye::after {
            content: '';
            position: absolute;
            top: 10%;
            left: 10%;
            width: 30%;
            height: 20%;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            filter: blur(2px);
        }

        .eye.closed {
            height: 4px;
            margin-top: calc(var(--eye-height) / 2 - 2px);
            margin-bottom: calc(var(--eye-height) / 2 - 2px);
            box-shadow: 0 0 10px var(--eye-shadow);
        }

        /* Glow animation for "alive" feel */
        @keyframes pulse {
            0% {
                opacity: 0.8;
                box-shadow: 0 0 20px var(--eye-shadow);
            }

            50% {
                opacity: 1;
                box-shadow: 0 0 40px var(--eye-shadow);
            }

            100% {
                opacity: 0.8;
                box-shadow: 0 0 20px var(--eye-shadow);
            }
        }

        .eye:not(.closed) {
            animation: pulse 4s infinite ease-in-out;
        }

        .status-indicator {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Loader Styles */
        #loader {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: opacity 0.3s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 242, 255, 0.1);
            border-top: 3px solid var(--eye-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            filter: drop-shadow(0 0 10px var(--eye-shadow));
        }

        .loader-text {
            color: var(--eye-color);
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.8;
            animation: pulse-text 1.5s infinite ease-in-out;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse-text {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }
        }

        /* Mouth Styles */
        .mouth {
            position: absolute;
            bottom: -140px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 100px;
            transition: all 0.3s ease;
            opacity: 0.8;
        }

        .lip {
            fill: none;
            stroke: var(--eye-color);
            stroke-width: 8;
            stroke-linecap: round;
            filter: drop-shadow(0 0 10px var(--eye-shadow));
            transition: all 0.3s ease;
        }

        /* Closed state (flat lines) */
        #lip-upper {
            d: path("M 30 50 Q 100 50 170 50");
        }

        #lip-lower {
            d: path("M 30 52 Q 100 52 170 52");
        }

        /* Speaking animation */
        .speaking #lip-upper {
            animation: talk-upper 0.25s infinite ease-in-out;
        }

        .speaking #lip-lower {
            animation: talk-lower 0.25s infinite ease-in-out;
        }

        @keyframes talk-upper {

            0%,
            100% {
                d: path("M 30 50 Q 100 50 170 50");
                transform: translateY(0);
            }

            50% {
                d: path("M 30 50 Q 100 20 170 50");
                transform: translateY(-10px);
            }
        }

        @keyframes talk-lower {

            0%,
            100% {
                d: path("M 30 52 Q 100 52 170 52");
                transform: translateY(0);
            }

            50% {
                d: path("M 30 52 Q 100 82 170 52");
                transform: translateY(10px);
            }
        }
    </style>
</head>

<body>
    <div id="loader">
        <div class="spinner"></div>
        <!--div class="loader-text">Analisi in corso</div-->
    </div>
    <div class="face-container">
        <div id="eye-left" class="eye"></div>
        <div id="eye-right" class="eye"></div>
        <svg id="mouth-svg" class="mouth" viewBox="0 0 200 100">
            <path id="lip-upper" class="lip" />
            <path id="lip-lower" class="lip" />
        </svg>
        <div id="status" class="status-indicator">System Active</div>
    </div>

    <script>
        const eyeLeft = document.getElementById('eye-left');
        const eyeRight = document.getElementById('eye-right');
        const statusText = document.getElementById('status');
        const loader = document.getElementById('loader');
        const mouthSvg = document.getElementById('mouth-svg');

        function updateEyes(state) {
            if (state === 'closed') {
                eyeLeft.classList.add('closed');
                eyeRight.classList.add('closed');
            } else {
                eyeLeft.classList.remove('closed');
                eyeRight.classList.remove('closed');
            }
        }

        async function pollStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();

                updateEyes(data.eyes);
                statusText.innerText = `System: ${data.eyes}`;

                // Toggle Loader
                if (data.busy) {
                    loader.style.display = 'flex';
                } else {
                    loader.style.display = 'none';
                }

                // Toggle Speaking (Mouth Animation)
                if (data.speaking) {
                    mouthSvg.classList.add('speaking');
                } else {
                    mouthSvg.classList.remove('speaking');
                }
            } catch (err) {
                console.error("Polling error:", err);
            }
        }

        // Poll every 100ms for responsiveness
        setInterval(pollStatus, 100);

        // Initial blink animation sequence for "boot up"
        setTimeout(() => {
            updateEyes('closed');
            setTimeout(() => updateEyes('open'), 150);
        }, 1000);
    </script>
</body>

</html>
